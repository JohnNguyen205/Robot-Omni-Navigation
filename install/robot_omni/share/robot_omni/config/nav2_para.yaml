amcl:
  ros__parameters:
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    introspection_mode: "disabled"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 25.0
    laser_min_range: 0.05
    laser_model_type: "likelihood_field"
    max_beams: 150
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    random_seed: -1
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /merged
    map_topic: map
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

map_server:
  ros__parameters:
    yaml_filename: "my_map.yaml"
    topic_name: "map"
    frame_id: "map"
    introspection_mode: "disabled"


global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 50.0
      publish_frequency: 50.0
      global_frame: map
      robot_base_frame: base_link
      #robot_radius: 0.22
      footprint: "[ [0.28, 0.2], [0.28, -0.2], [-0.28, -0.2], [-0.28, 0.2] ]"
      resolution: 0.05
      track_unknown_space: false
      rolling_window: false
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan camera_points rear_camera_points
        scan:
          topic: /merged
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        camera_points:
          topic: /camera/points
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
        rear_camera_points:
          topic: /rear_camera/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0  

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.0  #10.0 
        inflation_radius: 0.5 #0.38
      always_send_full_costmap: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 50.0
      publish_frequency: 50.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      #robot_radius: 0.22
      footprint: "[ [0.28, 0.2], [0.28, -0.2], [-0.28, -0.2], [-0.28, 0.2] ]"
      footprint_padding: 0.01
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan camera_points rear_camera_points
        scan:
          topic: /merged
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

        camera_points:
          topic: /camera/points
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0
        rear_camera_points:
          topic: /rear_camera/points
          data_type: "PointCloud2"
          marking: true
          clearing: true
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.1
          min_obstacle_height: 0.05
          max_obstacle_height: 2.0  

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0 #10.0
        inflation_radius: 0.38 #0.4
      always_send_full_costmap: True

controller_server:
  ros__parameters:
    # controller server parameters (see Controller Server for more info)
    controller_frequency: 50.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 8.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.4
      yaw_goal_tolerance: 3.14
      stateful: True
    # DWB controller parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: -0.7
      min_vel_y: 0.0 # 0
      max_vel_x: 0.7 #0.5 
      max_vel_y: 0.0
      max_vel_theta: 1.5 #1,0
      min_speed_xy: -0.7
      max_speed_xy: 0.7 #0.5
      min_speed_theta: -1.5
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: -2.5
      decel_lim_theta: -3.2
      vx_samples: 50
      vy_samples: 50
      vtheta_samples: 50
      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.25
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "Twirling"]
      BaseObstacle.scale: 0.1 #0.02
      PathAlign.scale: 15.0 #32.0
      GoalAlign.scale: 25.0
      PathAlign.forward_point_distance: 0.3
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 1000.0
      GoalDist.scale: 2.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 4.0
      RotateToGoal.lookahead_time: -1.0
      Twirling.scale: 1.0 # Bắt đầu bằng 1.0, nếu vẫn méo hãy thử tăng lên 2.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 50.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.3
      use_astar: false
      allow_unknown: true

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: "base_link"
    odom_topic: "/odometry/filtered" #We're using ekf node, so use filtered data!
    transform_tolerance: 0.5 
    filter_duration: 0.3 
    #default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_to_pose_bt_xml: /home/tof/ros2_ws_project_demo/my_nav_recovery.xml
    default_nav_through_poses_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    always_reload_bt_xml: false 
    goal_blackboard_id: goal 
    goals_blackboard_id: goals 
    path_blackboard_id: path 
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - spin
      - route
      - undock_robot
      - wait

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: "base_link"
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    # max_rotational_vel: 1.0   - Old values, new values below designed to closely match real robots speeds
    max_rotational_vel: 0.7
    min_rotational_vel: -0.7
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false  # Rất quan trọng: Nếu đặt false, khi 1 điểm bị kẹt robot sẽ bỏ qua và đi tiếp điểm sau
    waypoint_task_executor_plugin: "wait_at_waypoint"   # Nhiệm vụ tại mỗi điểm
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 0 # Đặt 0 nếu muốn robot đi liên tục không dừng